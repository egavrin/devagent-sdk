name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: devagent-sdk

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        working-directory: devagent-sdk
        run: bun install

      - name: Typecheck
        working-directory: devagent-sdk
        run: bun run typecheck

      - name: Test
        working-directory: devagent-sdk
        run: bun run test
